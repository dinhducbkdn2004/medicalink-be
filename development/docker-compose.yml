services:
  postgres:
    # Đã đổi từ :latest sang :15-alpine cho nhẹ và ổn định
    image: postgres:15-alpine
    container_name: medicalink-db
    restart: always # Tự động chạy lại nếu lỗi hoặc khởi động lại máy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
      TZ: "UTC"
    ports:
      - "5432:5432"
    volumes:
      - medicalink_db:/var/lib/postgresql/data
      - ../scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - medicalink-network

  redis:
    # Đã đổi từ :latest sang :7-alpine
    image: redis:7-alpine
    container_name: medicalink-redis
    restart: always
    # (A) Using named volume (persistent storage):
    volumes:
      - medicalink_redis:/data
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--appendfsync", "everysec",
      "--save", "900", "1",
      "--save", "300", "10",
      "--save", "60", "10000",
    ]
    ports:
      - "15796:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - medicalink-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: medicalink-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_ERLANG_COOKIE: SWQOKODSQALRPCLNMEQG
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - medicalink_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - medicalink-network

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: medicalink-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Named volume: dữ liệu embedding giữ khi restart. Tuỳ chọn bind mount:
      # - ./qdrant_storage:/qdrant/storage
      - medicalink_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - medicalink-network

volumes:
  medicalink_db:
  medicalink_redis:
  medicalink_rabbitmq:
  medicalink_qdrant:

networks:
  medicalink-network:
    # Tên cố định để medicalink-ai-service (compose riêng) join: external: true + name: medicalink-network
    name: medicalink-network
    driver: bridge
